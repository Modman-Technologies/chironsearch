<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiron Nexus Auth Test</title>

<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="YOUR_CLERK_PUBLISHABLE_KEY"
  src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
</script>

<style>
body{
  font-family: Arial, sans-serif;
  margin:40px;
  max-width:800px;
}

button{
  padding:10px 16px;
  margin:6px 0;
  cursor:pointer;
}

pre{
  background:#f5f5f5;
  padding:12px;
  overflow:auto;
}
</style>
</head>

<body>

<h1>Chiron Nexus — Auth Test</h1>

<div id="auth-state">Loading...</div>

<button id="signin">Sign In</button>
<button id="signout">Sign Out</button>

<h2>User Info</h2>

<div>Email: <span id="email">--</span></div>
<div>User ID: <span id="userid">--</span></div>
<div>Access Tier: <span id="tier">--</span></div>

<h2>Search API Test</h2>

<input id="query" placeholder="Enter query"/>
<button id="testSearch">Run Search</button>

<pre id="result"></pre>

<script>

let clerk;

async function init(){

  clerk = window.Clerk;

  await clerk.load();

  updateAuth();

  document.getElementById("signin").onclick = () => clerk.openSignIn();

  document.getElementById("signout").onclick = () => clerk.signOut();

}

function updateAuth(){

  const user = clerk.user;

  if(!user){
    document.getElementById("auth-state").innerText = "Not signed in";
    return;
  }

  document.getElementById("auth-state").innerText = "Signed in";

  const email = user.primaryEmailAddress?.emailAddress;

  document.getElementById("email").innerText = email || "--";

  document.getElementById("userid").innerText = user.id;

}

document.getElementById("testSearch").onclick = async () => {

  const q = document.getElementById("query").value;

  const token = await clerk.session.getToken();

  const res = await fetch("/api/search",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${token}`
    },
    body:JSON.stringify({query:q})
  });

  const data = await res.json();

  document.getElementById("tier").innerText = data.access_tier || "--";

  document.getElementById("result").innerText = JSON.stringify(data,null,2);

};

init();

</script>

</body>
</html>
