<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiron Nexus — Auth Test</title>

<script
  id="clerk-script"
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_Z3Jvd24tamVubmV0LTMyLmNsZXJrLmFjY291bnRzLmRldiQ"
  src="https://grown-jennet-32.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js">
</script>

<style>
body{
  font-family: Arial, sans-serif;
  margin:40px;
  max-width:900px;
}

button{
  padding:10px 16px;
  margin:6px 6px 6px 0;
  cursor:pointer;
}

input{
  padding:10px 12px;
  width:260px;
  margin-right:8px;
}

pre{
  background:#f5f5f5;
  padding:12px;
  overflow:auto;
  white-space:pre-wrap;
  word-break:break-word;
  min-height:180px;
}

.muted{
  color:#666;
}
</style>

</head>
<body>

<h1>Chiron Nexus — Auth Test</h1>

<div id="auth-state">Loading...</div>

<button id="signin">Sign In</button>
<button id="signout">Sign Out</button>

<h2>User Info</h2>

<div>Email: <span id="email">--</span></div>
<div>User ID: <span id="userid">--</span></div>
<div>Access Tier: <span id="tier">--</span></div>

<h2>Search API Test</h2>

<input id="query" value="weather today">
<button id="run">Run Search</button>

<pre id="result"></pre>

<script>

let clerk = null;

const authState = document.getElementById("auth-state");
const emailEl = document.getElementById("email");
const userIdEl = document.getElementById("userid");
const tierEl = document.getElementById("tier");
const resultEl = document.getElementById("result");
const queryEl = document.getElementById("query");

const signInBtn = document.getElementById("signin");
const signOutBtn = document.getElementById("signout");
const runBtn = document.getElementById("run");


function setSignedOut(){
  authState.innerText="Not signed in";
  emailEl.innerText="--";
  userIdEl.innerText="--";
  tierEl.innerText="--";
}

function updateAuth(){

  if(!clerk || !clerk.user){
    setSignedOut();
    return;
  }

  const user = clerk.user;
  const email = user.primaryEmailAddress?.emailAddress || "--";

  authState.innerText="Signed in";
  emailEl.innerText=email;
  userIdEl.innerText=user.id;
}

async function init(){

  if(!window.Clerk){
    authState.innerText="Clerk failed to load";
    return;
  }

  clerk = window.Clerk;

  await clerk.load();

  updateAuth();

  clerk.addListener(({user})=>{
    if(!user){
      setSignedOut();
      return;
    }
    updateAuth();
  });

  signInBtn.onclick=()=>{
    clerk.openSignIn();
  };

  signOutBtn.onclick=async()=>{
    await clerk.signOut();
    setSignedOut();
    resultEl.innerText="";
  };

  runBtn.onclick=runSearch;

  queryEl.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
      runSearch();
    }
  });

}

async function runSearch(){

  const q=queryEl.value.trim();

  if(!q){
    resultEl.innerText="Enter a query.";
    return;
  }

  if(!clerk){
    resultEl.innerText="Clerk not initialized.";
    return;
  }

  let token="";

  try{
    if(clerk.session){
      token = await clerk.session.getToken({skipCache:true});
    }
  }catch(err){
    console.error("Token error",err);
  }

  resultEl.innerText="Running search...";

  try{

    const headers={
      "Content-Type":"application/json"
    };

    if(token){
      headers["Authorization"]=`Bearer ${token}`;
    }

    const res = await fetch("/api/search",{
      method:"POST",
      headers,
      body:JSON.stringify({query:q})
    });

    const text = await res.text();

    let data;

    try{
      data = JSON.parse(text);
    }catch{
      resultEl.innerText=text;
      return;
    }

    tierEl.innerText = data.access_tier || "--";

    resultEl.innerText = JSON.stringify(data,null,2);

  }catch(err){

    resultEl.innerText="Search failed: "+err.message;

  }

}


/* wait for clerk script to load */

const clerkScript=document.getElementById("clerk-script");

if(window.Clerk){
  init();
}
else if(clerkScript){

  clerkScript.addEventListener("load",()=>{
    init();
  });

  clerkScript.addEventListener("error",()=>{
    authState.innerText="Clerk script failed to load";
  });

}
else{
  authState.innerText="Clerk script tag missing";
}

</script>

</body>
</html>
