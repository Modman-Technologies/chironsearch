<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chiron Nexus Auth Test</title>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="YOUR_CLERK_PUBLISHABLE_KEY"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 800px;
    }

    button {
      padding: 10px 16px;
      margin: 6px 0;
      cursor: pointer;
    }

    input {
      padding: 10px 12px;
      width: 100%;
      max-width: 420px;
      margin-right: 8px;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Chiron Nexus — Auth Test</h1>

  <div id="auth-state">Loading...</div>

  <button id="signin" type="button">Sign In</button>
  <button id="signout" type="button">Sign Out</button>

  <h2>User Info</h2>
  <div>Email: <span id="email">--</span></div>
  <div>User ID: <span id="userid">--</span></div>
  <div>Access Tier: <span id="tier">--</span></div>

  <h2>Search API Test</h2>
  <input id="query" placeholder="Enter query" />
  <button id="testSearch" type="button">Run Search</button>

  <pre id="result"></pre>

  <script>
    let clerk;

    function setText(id, value) {
      document.getElementById(id).innerText = value ?? "--";
    }

    function updateAuth() {
      const user = clerk?.user || null;
      const session = clerk?.session || null;

      if (!user || !session) {
        setText("auth-state", "Not signed in");
        setText("email", "--");
        setText("userid", "--");
        setText("tier", "--");
        return;
      }

      setText("auth-state", "Signed in");
      setText("email", user.primaryEmailAddress?.emailAddress || "--");
      setText("userid", user.id || "--");
    }

    async function init() {
      clerk = window.Clerk;
      await clerk.load();

      updateAuth();

      if (typeof clerk.addListener === "function") {
        clerk.addListener(() => {
          updateAuth();
        });
      }

      document.getElementById("signin").onclick = async () => {
        await clerk.openSignIn();
        updateAuth();
      };

      document.getElementById("signout").onclick = async () => {
        await clerk.signOut();
        updateAuth();
      };

      document.getElementById("testSearch").onclick = async () => {
        const q = document.getElementById("query").value.trim();

        if (!q) {
          document.getElementById("result").innerText = "Enter a query first.";
          return;
        }

        if (!clerk.session) {
          document.getElementById("result").innerText = "Not signed in.";
          setText("tier", "--");
          return;
        }

        try {
          const token = await clerk.session.getToken({ skipCache: true });

          console.log("CLIENT email:", clerk.user?.primaryEmailAddress?.emailAddress || null);
          console.log("CLIENT userId:", clerk.user?.id || null);
          console.log("CLIENT token prefix:", token ? token.slice(0, 24) : "NO_TOKEN");

          const res = await fetch("/api/search", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(token ? { "Authorization": `Bearer ${token}` } : {})
            },
            body: JSON.stringify({ query: q })
          });

          const data = await res.json();
          setText("tier", data.access_tier || "--");
          document.getElementById("result").innerText = JSON.stringify(data, null, 2);
        } catch (error) {
          console.error(error);
          document.getElementById("result").innerText =
            JSON.stringify(
              {
                error: "Search/auth test failed",
                message: error?.message || String(error)
              },
              null,
              2
            );
        }
      };
    }

    init();
  </script>
</body>
</html>
