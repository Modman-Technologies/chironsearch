<!DOCTYPE html>
<html>
<head>
  <title>Chiron Nexus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 20px;
      text-align: center;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 40px;
    }

    .search-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    input {
      width: 520px;
      max-width: 100%;
      padding: 16px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 16px 24px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .panel {
      background: #1e293b;
      border-radius: 14px;
      padding: 24px;
      margin-top: 20px;
      text-align: left;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .panel h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 22px;
    }

    .answer-text {
      color: #e2e8f0;
      line-height: 1.6;
      font-size: 16px;
      white-space: pre-wrap;
    }

    .source-list,
    .meta-list {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .source-pill,
    .meta-pill {
      background: #334155;
      color: #e2e8f0;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
    }

    .meta-pill.high {
      background: #166534;
      color: #dcfce7;
    }

    .meta-pill.medium {
      background: #92400e;
      color: #fef3c7;
    }

    .meta-pill.low {
      background: #7f1d1d;
      color: #fee2e2;
    }

    .meta-pill.cached-yes {
      background: #1d4ed8;
      color: #dbeafe;
    }

    .meta-pill.cached-no {
      background: #475569;
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chiron Nexus</h1>
    <div class="subtitle">A unified answer layer across multiple AI systems</div>

    <div class="search-bar">
      <input id="query" type="text" placeholder="Ask anything..." onkeydown="if(event.key==='Enter'){search()}" />
      <button id="search-button" onclick="search()">Search</button>
    </div>

    <div class="panel">
      <h2>Unified Answer</h2>
      <div class="answer-text" id="unified-answer">
        Your combined answer will appear here.
      </div>
    </div>

    <div class="panel">
      <h2>Answer Details</h2>
      <div class="meta-list" id="answer-details">
        <div class="meta-pill">Confidence: --</div>
        <div class="meta-pill">Provider: --</div>
        <div class="meta-pill">Cached: --</div>
        <div class="meta-pill">Response Time: --</div>
      </div>
    </div>

    <div class="panel">
      <h2>AI Sources</h2>
      <div class="source-list" id="ai-sources">
        <div class="source-pill">OpenAI</div>
        <div class="source-pill">Gemini</div>
      </div>
    </div>
  </div>

<script>
function formatProvider(provider) {
  if (!provider) return "--";
  if (provider === "chiron-nexus") return "Chiron Nexus";
  if (provider === "openai") return "OpenAI";
  if (provider === "gemini") return "Gemini";
  return provider;
}

function renderDetails(data) {
  const confidence = (data.confidence || "--").toLowerCase();
  const provider = formatProvider(data.provider);
  const cached = data.cached ? "Yes" : "No";

  const responseTime = data.response_time_ms
    ? (data.response_time_ms / 1000).toFixed(2) + "s"
    : "--";

  const confidenceClass =
    confidence === "high"
      ? "high"
      : confidence === "medium"
      ? "medium"
      : confidence === "low"
      ? "low"
      : "";

  const cachedClass = data.cached ? "cached-yes" : "cached-no";

  document.getElementById("answer-details").innerHTML = `
    <div class="meta-pill ${confidenceClass}">
      Confidence: ${confidence.charAt(0).toUpperCase() + confidence.slice(1)}
    </div>
    <div class="meta-pill">
      Provider: ${provider}
    </div>
    <div class="meta-pill ${cachedClass}">
      Cached: ${cached}
    </div>
    <div class="meta-pill">
      Response Time: ${responseTime}
    </div>
  `;
}

function renderSources(sources) {
  const html = (sources || [])
    .map(src => `<div class="source-pill">${src}</div>`)
    .join("");

  document.getElementById("ai-sources").innerHTML =
    html || '<div class="source-pill">No sources</div>';
}

async function search() {
  const query = document.getElementById("query").value.trim();
  const button = document.getElementById("search-button");

  if (!query) {
    document.getElementById("unified-answer").innerText =
      "Please enter a question.";
    return;
  }

  button.disabled = true;
  button.innerText = "Searching...";

  document.getElementById("unified-answer").innerText =
    "Consulting multiple AI systems...";

  document.getElementById("answer-details").innerHTML = `
    <div class="meta-pill">Confidence: --</div>
    <div class="meta-pill">Provider: --</div>
    <div class="meta-pill">Cached: --</div>
    <div class="meta-pill">Response Time: --</div>
  `;

  document.getElementById("ai-sources").innerHTML =
    '<div class="source-pill">Loading...</div>';

  try {
    const response = await fetch("/api/search", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ query })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.answer || "Request failed");
    }

    document.getElementById("unified-answer").innerText =
      data.answer || "No answer returned.";

    renderDetails(data);
    renderSources(data.sources);
  } catch (error) {
    document.getElementById("unified-answer").innerText =
      error.message || "There was a problem contacting Chiron Engine.";

    document.getElementById("answer-details").innerHTML = `
      <div class="meta-pill low">Confidence: --</div>
      <div class="meta-pill">Provider: --</div>
      <div class="meta-pill cached-no">Cached: --</div>
      <div class="meta-pill">Response Time: --</div>
    `;

    document.getElementById("ai-sources").innerHTML =
      '<div class="source-pill">Unavailable</div>';
  } finally {
    button.disabled = false;
    button.innerText = "Search";
  }
}
</script>
</body>
</html>
